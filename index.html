<!DOCTYPE html>
<html>
<head>
  <title>WorkforcePro Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-container">

  <!-- TITLE BAR -->
  <div class="title-bar">
    <h1 id="dashboardTitle"></h1>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="dashboard-actions">
    <button onclick="toggleDarkMode()">Dark Mode</button>
    <a href="admin.html" class="add-btn">+ Add Employee</a>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>

  <!-- KPI CARDS -->
  <div class="dashboard-kpis">

    <div class="kpi-card">
      <h3>Total Employees</h3>
      <p id="totalEmp">0</p>
    </div>

    <div class="kpi-card">
      <h3>Active</h3>
      <p id="activeEmp">0</p>
    </div>

    <div class="kpi-card">
      <h3>On Leave</h3>
      <p id="leaveEmp">0</p>
    </div>

    <div class="kpi-card">
      <h3>Resigned</h3>
      <p id="resignedEmp">0</p>
    </div>

    <div class="kpi-card">
      <h3>Total Salary</h3>
      <p id="totalSalary">₹0</p>
    </div>

    <div class="kpi-card">
      <h3>Avg Salary</h3>
      <p id="avgSalary">₹0</p>
    </div>

  </div>

  <!-- CHART -->
  <div class="dashboard-chart">
    <canvas id="deptChart"></canvas>
  </div>

  <!-- EMPLOYEES -->
  <h2 class="employee-title">Employees</h2>
  <div class="employee-grid" id="employeeList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
